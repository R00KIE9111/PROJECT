<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <title>Mis Asignaciones</title>
</head>
<body>
    <div style="margin: 10px 0;"><a href="{{ url_for('index') }}" style="padding: 8px 15px; background: #007bff; color: white; text-decoration: none; border-radius: 4px;">&larr; Volver a Inicio</a></div>

    <h1>Mis Asignaciones</h1>
    <table border="1">
        <tr>
            <th>Número de Serie</th>
            <th>Fecha Entrega</th>
            <th>Fecha Devolución</th>
        </tr>
        {% for a in asignaciones %}
        <tr>
            <td>{{ a.numero_serie }}</td>
            <td>{{ a.fecha_entrega }}</td>
            <td>{{ a.fecha_devolucion }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
