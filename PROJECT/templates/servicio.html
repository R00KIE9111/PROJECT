<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <title>Gestión de Servicios Técnicos</title>
</head>
<body>
    <h1>Servicios Técnicos</h1>
    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}
    <form method="POST" action="{{ url_for('servicio') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label>Código:</label>
        <input type="text" name="codigo" required><br>
        <label>Nombre Empresa:</label>
        <input type="text" name="nombre_empresa" required><br>
        <button type="submit">Crear Servicio</button>
    </form>
    <hr>
    <h2>Lista de Servicios Técnicos</h2>
    <table border="1">
        <tr>
            <th>Código</th>
            <th>Nombre Empresa</th>
            <th>Acciones</th>
        </tr>
        {% for s in servicios %}
        <tr>
            <td>{{ s.codigo }}</td>
            <td>{{ s.nombre_empresa }}</td>
            <td>
                <a href="{{ url_for('servicio_eliminar', codigo=s.codigo) }}">Eliminar</a>
                <form method="POST" action="{{ url_for('servicio_editar', codigo=s.codigo) }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <input type="text" name="nombre_empresa" value="{{ s.nombre_empresa }}" required>
                    <button type="submit">Editar</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
