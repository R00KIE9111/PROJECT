<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <title>Gestión de Usuarios</title>
</head>
<body>
    <div style="margin: 10px 0;"><a href="{{ url_for('index') }}" style="padding: 8px 15px; background: #007bff; color: white; text-decoration: none; border-radius: 4px;">&larr; Volver a Inicio</a></div>

    <h1>Usuarios</h1>
    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}
    <form method="POST" action="{{ url_for('usuarios') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label>RUT:</label>
        <input type="text" name="rut" required><br>
        <label>Nombre:</label>
        <input type="text" name="nombre" required><br>
        <label>Contraseña:</label>
        <input type="password" name="password" required><br>
        <label>Rol:</label>
        <select name="rol">
            <option value="empleado">Empleado</option>
            <option value="admin">Administrador</option>
        </select><br>
        <button type="submit">Crear Usuario</button>
    </form>
    <hr>
    <h2>Lista de Usuarios</h2>
    <table border="1">
        <tr>
            <th>RUT</th>
            <th>Nombre</th>
            <th>Rol</th>
            <th>Acciones</th>
        </tr>
        {% for u in usuarios %}
        <tr>
            <td>{{ u.rut_usuario }}</td>
            <td>{{ u.nombre }}</td>
            <td>{{ u.rol }}</td>
            <td>
                <a href="{{ url_for('usuarios_eliminar', rut=u.rut_usuario) }}">Eliminar</a>
                <form method="POST" action="{{ url_for('usuarios_editar', rut=u.rut_usuario) }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <input type="text" name="nombre" value="{{ u.nombre }}" required>
                    <input type="password" name="password" placeholder="Nueva contraseña (opcional)">
                    <select name="rol">
                        <option value="empleado" {% if u.rol == 'empleado' %}selected{% endif %}>Empleado</option>
                        <option value="admin" {% if u.rol == 'admin' %}selected{% endif %}>Administrador</option>
                    </select>
                    <button type="submit">Editar</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
