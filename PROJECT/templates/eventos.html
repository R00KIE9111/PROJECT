<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <title>Eventos de Auditoría</title>
</head>
<body>
    <h1>Eventos de Auditoría</h1>
    <table border="1">
        <tr>
            <th>Usuario</th>
            <th>Acción</th>
            <th>Detalle</th>
            <th>Resultado</th>
        </tr>
        {% for e in eventos %}
        <tr>
            <td>{{ e.usuario }}</td>
            <td>{{ e.accion }}</td>
            <td>{{ e.detalle }}</td>
            <td>{{ e.resultado }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
